name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Resolve protected branch
        run: |
          BASE_REF="${{ github.event.repository.default_branch }}"
          if [ -z "$BASE_REF" ]; then
            echo "Repository default branch is empty"
            exit 1
          fi
          echo "BASE_REF=$BASE_REF" >> "$GITHUB_ENV"

      - name: Fetch protected branch
        run: git fetch origin "$BASE_REF"

      - name: Ensure tag commit is on protected branch
        run: git merge-base --is-ancestor "$GITHUB_SHA" "origin/$BASE_REF"

      - name: Run release config tests
        run: go test ./cmd -v

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: '~> v2'
          args: check

      - name: Smoke test version metadata
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="$(git rev-parse --short "$GITHUB_SHA")"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -ldflags "-X github.com/largeoliu/redmine-cli/internal/app.version=$VERSION -X github.com/largeoliu/redmine-cli/internal/app.commit=$COMMIT -X github.com/largeoliu/redmine-cli/internal/app.date=$DATE" -o bin/redmine ./cmd
          OUT="$(./bin/redmine version)"
          printf '%s\n' "$OUT"
          case "$OUT" in
            *"redmine version $VERSION"* ) ;;
            * ) echo "version metadata missing"; exit 1 ;;
          esac
          case "$OUT" in
            *"commit: $COMMIT"* ) ;;
            * ) echo "commit metadata missing"; exit 1 ;;
          esac
          case "$OUT" in
            *"built:  $DATE"* ) ;;
            * ) echo "build date metadata missing"; exit 1 ;;
          esac

  goreleaser:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set package version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
