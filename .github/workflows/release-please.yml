name: Release Please

on:
  push:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4.4.1
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: go
          default-branch: master
          merge-mode: squash-merge
