name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run commitlint
        uses: wagoid/commitlint-github-action@v6

  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: |
          export GOTOOLCHAIN=auto
          go mod verify
          go mod tidy -diff

      - name: Check code formatting
        run: |
          export GOTOOLCHAIN=auto
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files need formatting:"
            gofmt -s -l .
            exit 1
          fi
          echo "All files are properly formatted"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m
          cache-invalidation-interval: 120

  test:
    name: Test (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute shard packages
        id: shard
        run: |
          ALL_PKGS=($(go list ./... | grep -v -e integration -e e2e))
          PKGS=""
          for ((i=0; i<${#ALL_PKGS[@]}; i++)); do
            if (( i % 3 == ${{ matrix.shard }} )); then
              PKGS="$PKGS ${ALL_PKGS[$i]}"
            fi
          done
          echo "packages=$PKGS" >> $GITHUB_OUTPUT
          echo "Running packages for shard ${{ matrix.shard }}: $PKGS"

      - name: Run tests
        run: |
          export GOTOOLCHAIN=auto
          go test -v -race -coverprofile=coverage_${{ matrix.shard }}.out -covermode=atomic ${{ steps.shard.outputs.packages }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage_${{ matrix.shard }}.out
          retention-days: 1

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download coverage artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: coverage-shard-*
          merge-multiple: true

      - name: Merge coverage profiles
        run: |
          export GOTOOLCHAIN=auto
          head -1 coverage_0.out > coverage_all.out
          for f in coverage_*.out; do
            grep -v "^mode:" "$f" >> coverage_all.out
          done
          echo "Merged coverage from $(ls coverage_*.out | wc -l | tr -d ' ') shards"
          go tool cover -func=coverage_all.out

      - name: Check coverage threshold (90%)
        run: |
          export GOTOOLCHAIN=auto
          THRESHOLD=90
          grep -v -e "cmd/main.go" -e "internal/testutil/leak.go" -e "internal/app/root.go" coverage_all.out > coverage_filtered.out 2>/dev/null || true

          if [ -s coverage_filtered.out ]; then
            COVERAGE=$(go tool cover -func=coverage_filtered.out | grep total | awk '{print $3}' | sed 's/%//')
            echo "Total coverage (excluding ignored files): ${COVERAGE}%"
            if awk "BEGIN {exit !($COVERAGE < $THRESHOLD)}"; then
              echo "Error: Coverage ${COVERAGE}% is below ${THRESHOLD}% threshold"
              exit 1
            fi
            echo "Coverage check passed: ${COVERAGE}%"
          else
            echo "Warning: coverage_filtered.out is empty, skipping coverage check"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage_all.out
          fail_ci_if_error: false

  generated:
    name: Generated Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify generated files are committed
        run: |
          export GOTOOLCHAIN=auto
          go generate ./...
          git diff --exit-code

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          export GOTOOLCHAIN=auto
          go build -o bin/redmine ./cmd

      - name: Run E2E tests
        run: |
          export GOTOOLCHAIN=auto
          go test -v -count=1 ./test/e2e/...

  fuzz-client:
    name: Fuzz (client)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run fuzz tests
        run: |
          export GOTOOLCHAIN=auto
          go test -fuzz=Fuzz -fuzztime=2m ./internal/client/...
        continue-on-error: true

  fuzz-output:
    name: Fuzz (output)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run fuzz tests
        run: |
          export GOTOOLCHAIN=auto
          go test -fuzz=Fuzz -fuzztime=2m ./internal/output/...
        continue-on-error: true

  benchmark:
    name: Benchmark (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - './internal/app/...'
          - './internal/client/...'
          - './internal/output/...'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        run: |
          export GOTOOLCHAIN=auto
          go test -bench=. -benchmem -benchtime=3s ${{ matrix.package }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Gosec Security Scanner
        uses: securego/gosec@v2.25.0
        env:
          GOTOOLCHAIN: auto
        with:
          args: -exclude=G104,G115 ./...

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, coverage, verify, generated]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          export GOTOOLCHAIN=auto
          go build -v -o bin/redmine ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: redmine-cli
          path: bin/redmine
          retention-days: 30

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [commitlint, lint, test, coverage, verify, generated, e2e, fuzz-client, fuzz-output, benchmark, security, build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          JOBS="${{ needs.commitlint.result }},${{ needs.lint.result }},${{ needs.test.result }},${{ needs.coverage.result }},${{ needs.verify.result }},${{ needs.generated.result }},${{ needs.e2e.result }},${{ needs.fuzz-client.result }},${{ needs.fuzz-output.result }},${{ needs.benchmark.result }},${{ needs.security.result }},${{ needs.build.result }}"
          echo "Job results: $JOBS"
          for JOB in $(echo "$JOBS" | tr ',' ' '); do
            if [ "$JOB" = "failure" ] || [ "$JOB" = "cancelled" ]; then
              echo "One or more CI jobs failed or were cancelled"
              exit 1
            fi
          done
          echo "All CI checks passed!"
