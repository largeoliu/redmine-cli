name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Verify dependencies
        run: |
          go mod verify
          go mod tidy -diff

      - name: Check code formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files need formatting:"
            gofmt -s -l .
            exit 1
          fi
          echo "All files are properly formatted"

      - name: Run tests with coverage
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v -e integration -e e2e)
          go tool cover -func=coverage.out

      - name: Check coverage threshold (90%)
        run: |
          THRESHOLD=90
          # 创建临时覆盖率文件，排除无法测试的文件
          grep -v -e "cmd/main.go" -e "internal/testutil/leak.go" -e "internal/app/root.go" coverage.out > coverage_filtered.out 2>/dev/null || true
          
          # 计算过滤后的覆盖率
          if [ -s coverage_filtered.out ]; then
            go tool cover -func=coverage_filtered.out
            COVERAGE=$(go tool cover -func=coverage_filtered.out | grep total | awk '{print $3}' | sed 's/%//')
            echo "Total coverage (excluding ignored files): ${COVERAGE}%"
            # 使用 awk 替代 bc 进行数值比较
            if awk "BEGIN {exit !($COVERAGE < $THRESHOLD)}"; then
              echo "Error: Coverage ${COVERAGE}% is below ${THRESHOLD}% threshold"
              exit 1
            fi
            echo "Coverage check passed: ${COVERAGE}%"
          else
            echo "Warning: coverage_filtered.out is empty, skipping coverage check"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build binary
        run: go build -o bin/redmine ./cmd

      - name: Run E2E tests
        run: go test -v -count=1 ./test/e2e/...

  fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run fuzz tests (client)
        run: go test -fuzz=Fuzz -fuzztime=5m ./internal/client/...
        continue-on-error: true

      - name: Run fuzz tests (output)
        run: go test -fuzz=Fuzz -fuzztime=5m ./internal/output/...
        continue-on-error: true

  benchmark:
    name: Benchmark (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - './internal/app/...'
          - './internal/client/...'
          - './internal/output/...'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run benchmarks
        run: go test -bench=. -benchmem -benchtime=5s ${{ matrix.package }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        run: go build -v -o bin/redmine ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redmine-cli
          path: bin/redmine
          retention-days: 7

  # 汇总 job，所有检查通过后才成功
  # 用于 release workflow 依赖
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, test, e2e, fuzz, benchmark, security, build]
    steps:
      - name: All checks passed
        run: echo "All CI checks passed!"
