version: 2

project_name: redmine

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd
    binary: redmine
    ldflags:
      - -s -w
      - -X github.com/largeoliu/redmine-cli/internal/app.version={{.Version}}
      - -X github.com/largeoliu/redmine-cli/internal/app.commit={{.Commit}}
      - -X github.com/largeoliu/redmine-cli/internal/app.date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "redmine-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

signs:
  - cmd: cosign
    signature: '${artifact}.sigstore.json'
    args:
      - sign-blob
      - '--bundle=${signature}'
      - '${artifact}'
      - --yes
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: largeoliu
    name: redmine-cli
  draft: false
  prerelease: auto
  replace_existing_artifacts: false
