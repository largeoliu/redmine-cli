project_name: redmine

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd
    binary: redmine
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: largeoliu
    name: redmine-cli
  draft: false
  prerelease: auto
  overwrite: true

npm:
  - name: redminectl
    registry: npmjs
    token: "{{ .Env.NPM_TOKEN }}"

brews:
  - name: redmine-cli
    repository:
      owner: largeoliu
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/largeoliu/redmine-cli"
    description: "AI Agent friendly Redmine CLI tool"
    license: "MIT"
    test: |
      system "#{bin}/redmine version"
    install: |
      bin.install "redmine"
